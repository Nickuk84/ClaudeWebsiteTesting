<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | AEGIS London</title>
  <meta name="robots" content="noindex, nofollow">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--clr-charcoal) 0%, var(--clr-navy) 50%, #0f3460 100%);
      position: relative;
      overflow: hidden;
      padding: 40px;
      text-align: center;
    }
    .error-page .hero-orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.2; pointer-events: none; }
    .error-page .hero-orb--1 { width: 500px; height: 500px; background: var(--clr-orange); top: -200px; right: -100px; }
    .error-page .hero-orb--2 { width: 350px; height: 350px; background: #3b82f6; bottom: -150px; left: -100px; }
    .error-content { position: relative; z-index: 2; max-width: 600px; }
    .error-code {
      font-family: var(--font-heading);
      font-size: clamp(6rem, 15vw, 12rem);
      font-weight: 800;
      color: transparent;
      -webkit-text-stroke: 2px rgba(232,119,46,0.4);
      line-height: 1;
      margin-bottom: 16px;
      animation: fadeInUp 0.8s var(--ease-out-expo) both;
    }
    .error-content h1 {
      font-size: clamp(1.5rem, 3vw, 2.25rem);
      color: var(--clr-white);
      font-weight: 700;
      margin-bottom: 16px;
      animation: fadeInUp 0.8s var(--ease-out-expo) 0.1s both;
    }
    .error-content p {
      color: rgba(255,255,255,0.5);
      font-size: 1.05rem;
      line-height: 1.8;
      margin-bottom: 40px;
      animation: fadeInUp 0.8s var(--ease-out-expo) 0.2s both;
    }
    .error-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeInUp 0.8s var(--ease-out-expo) 0.3s both;
    }
    .error-links {
      display: flex; gap: 24px; justify-content: center; flex-wrap: wrap;
      margin-top: 48px;
      animation: fadeInUp 0.8s var(--ease-out-expo) 0.4s both;
    }
    .error-links a {
      color: rgba(255,255,255,0.4); font-size: 0.875rem;
      transition: color 0.3s;
    }
    .error-links a:hover { color: var(--clr-orange); }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="hero-orb hero-orb--1"></div>
    <div class="hero-orb hero-orb--2"></div>
    <div class="error-content">
      <div class="error-code">404</div>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist or has been moved. Don't worry — let's get you back on track.</p>
      <div class="error-actions">
        <a href="index.html" class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
          Back to Homepage
        </a>
        <a href="contact.html" class="btn btn-secondary">
          Contact Us
        </a>
      </div>
      <div class="error-links">
        <a href="about.html">About Us</a>
        <a href="underwriting.html">Underwriting</a>
        <a href="digital.html">Digital Trading</a>
        <a href="news.html">News</a>
        <a href="claims.html">Claims</a>
      </div>
    </div>
  </div>

  <!-- Search Modal -->
  <div class="search-modal" id="searchModal" role="dialog" aria-label="Site search">
    <div class="search-modal-inner">
      <div class="search-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" class="search-input" placeholder="Search AEGIS London..." autocomplete="off">
        <button class="search-close">ESC</button>
      </div>
      <div class="search-results">
        <p class="search-hint">Type at least 2 characters to search...</p>
      </div>
    </div>
  </div>
</body>
</html>
