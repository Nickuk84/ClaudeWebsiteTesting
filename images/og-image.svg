<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a2e"/>
  <!-- Gradient accent line at top -->
  <rect x="0" y="0" width="1200" height="4" fill="#e8772e"/>
  <!-- AEGIS diamonds pattern (decorative) -->
  <g transform="translate(900,315)" opacity="0.06">
    <polygon points="0,-120 120,0 0,120 -120,0" fill="#e8772e"/>
    <polygon points="-130,-120 -10,0 -130,120 -250,0" fill="#e8772e"/>
    <polygon points="130,-120 250,0 130,120 10,0" fill="#e8772e"/>
    <polygon points="0,10 120,130 0,250 -120,130" fill="#e8772e"/>
  </g>
  <!-- Text content -->
  <text x="80" y="220" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" fill="#ffffff">AEGIS London</text>
  <text x="80" y="290" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="#e8772e">Syndicate 1225</text>
  <text x="80" y="370" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="rgba(255,255,255,0.6)">A Different Kind of Lloyd's Syndicate</text>
  <text x="80" y="420" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="rgba(255,255,255,0.35)">Specialist underwriting backed by the strength of the AEGIS mutual.</text>
  <!-- Ratings -->
  <g transform="translate(80,480)">
    <rect x="0" y="0" width="120" height="50" rx="8" fill="rgba(232,119,46,0.15)"/>
    <text x="60" y="22" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#e8772e" text-anchor="middle">A+</text>
    <text x="60" y="40" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="middle">A.M. Best</text>
    <rect x="140" y="0" width="120" height="50" rx="8" fill="rgba(232,119,46,0.15)"/>
    <text x="200" y="22" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#e8772e" text-anchor="middle">AA-</text>
    <text x="200" y="40" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="middle">S&amp;P Global</text>
  </g>
  <!-- URL -->
  <text x="80" y="590" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="rgba(255,255,255,0.25)">aegislondon.co.uk</text>
</svg>
